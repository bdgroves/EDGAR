name: EDGAR Daily Update

on:
  schedule:
    # 6:00 AM UTC = 10 PM PT (night before's games fully processed)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-edgar-v1

      - name: Install dependencies
        run: |
          pip install pybaseball mlb-statsapi pandas matplotlib jinja2 requests

      - name: Run data fetch
        run: python data/fetch_all.py

      - name: Build site
        run: python build_site.py

      - name: Commit & push site output
        run: |
          git config user.name  "edgar-bot"
          git config user.email "edgar-bot@users.noreply.github.com"
          git add docs/assets/data/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: daily update $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
